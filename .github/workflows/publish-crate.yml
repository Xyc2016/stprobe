name: Publish Crate

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      vars.CRATES_IO_AUTO_PUBLISH == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Read local crate version
        id: local
        shell: bash
        run: |
          pkgid="$(cargo pkgid --quiet)"
          version="${pkgid##*#}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Read latest published version
        id: published
        shell: bash
        run: |
          latest=""
          if response="$(curl -fsSL https://crates.io/api/v1/crates/stprobe 2>/dev/null)"; then
            latest="$(printf '%s' "$response" | sed -n 's/.*"max_version":"\([^"]*\)".*/\1/p')"
          fi

          echo "version=$latest" >> "$GITHUB_OUTPUT"

          if [ -z "$latest" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [ "$latest" = "${{ steps.local.outputs.version }}" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          elif [ "$(printf '%s\n%s\n' "$latest" "${{ steps.local.outputs.version }}" | sort -V | tail -n1)" = "${{ steps.local.outputs.version }}" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io
        if: steps.published.outputs.should_publish == 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: steps.published.outputs.should_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked --registry crates-io

      - name: Skip publish
        if: steps.published.outputs.should_publish != 'true'
        run: |
          echo "Skipping publish."
          echo "Local version: ${{ steps.local.outputs.version }}"
          echo "Latest crates.io version: ${{ steps.published.outputs.version }}"
