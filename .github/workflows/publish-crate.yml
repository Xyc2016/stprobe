name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --locked --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - macos-15
          - windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --locked

  publish:
    name: Publish crate
    needs:
      - lint
      - test
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.CRATES_IO_AUTO_PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Read local crate version
        id: local
        shell: bash
        run: |
          pkgid="$(cargo pkgid --quiet)"
          version="${pkgid##*#}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Read latest published version
        id: published
        shell: bash
        run: |
          latest=""
          if response="$(curl -fsSL -A 'stprobe-publish-check' https://crates.io/api/v1/crates/stprobe 2>/dev/null)"; then
            latest="$(printf '%s' "$response" | jq -r '.crate.max_version // empty')"
          fi

          echo "version=$latest" >> "$GITHUB_OUTPUT"

          if [ -z "$latest" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [ "$latest" = "${{ steps.local.outputs.version }}" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          elif [ "$(printf '%s\n%s\n' "$latest" "${{ steps.local.outputs.version }}" | sort -V | tail -n1)" = "${{ steps.local.outputs.version }}" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io
        if: steps.published.outputs.should_publish == 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish crate
        if: steps.published.outputs.should_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked --registry crates-io

      - name: Skip publish
        if: steps.published.outputs.should_publish != 'true'
        run: |
          echo "Skipping publish."
          echo "Local version: ${{ steps.local.outputs.version }}"
          echo "Latest crates.io version: ${{ steps.published.outputs.version }}"
